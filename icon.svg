<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#00f5d4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Outer triangle -->
  <polygon points="256,60 460,400 52,400" stroke="url(#spark)" stroke-width="12" fill="none"/>
  
  <!-- Inner triangle -->
  <polygon points="256,140 380,360 132,360" stroke="url(#spark)" stroke-width="8" fill="none" opacity="0.5"/>
  
  <!-- Center spark -->
  <circle cx="256" cy="280" r="40" fill="url(#spark)"/>
  
  <!-- Spark rays -->
  <line x1="256" y1="220" x2="256" y2="180" stroke="#00f5d4" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="260" x2="340" y2="240" stroke="#00f5d4" stroke-width="6" stroke-linecap="round"/>
  <line x1="300" y1="300" x2="340" y2="320" stroke="#9d4edd" stroke-width="6" stroke-linecap="round"/>
  <line x1="212" y1="260" x2="172" y2="240" stroke="#00f5d4" stroke-width="6" stroke-linecap="round"/>
  <line x1="212" y1="300" x2="172" y2="320" stroke="#9d4edd" stroke-width="6" stroke-linecap="round"/>
</svg>
